[mod-setting-description]
override-space-connection=Upravuje spojení z Nauvis na Vulcanus, Glebu a Fulgoru tak, aby procházela Mulunou. Donutí každou platformu na cestě k Nauvisu, aby svůj let ručně resetovala.
space-science-pack-output=Upravuje výstup obou receptur vesmírných vědeckých balíčků.
enable-nav-beacon=Pokud je povoleno na multiplayerových serverech může způsobit problémy s výkonem. 
muluna-hardcore-restrict-crusher=Omezuje recepty Drtiče a Drtiče 2 na Muluně a přidává do receptu Drtiče hliníkové plásty.
muluna-hardcore-restrict-asteroid-collector=Omezuje recept sběrače asteroidů na Muluně a přidává do něj hliníkové plásty.
muluna-change-quality-science-pack-drain=Pro zachování kompatibility s ostatními mody lze zakázat zamýšlené vyčerpávání vědeckých balíčků Muluny.
muluna-hardcore-remove-steam-furnaces=Odstraňuje ze hry budovy „Kamenná pec“ a „Ocelová pec“. Zvyšuje realismus, ale výrazně zvyšuje obtížnost zahájení hry na Muluně bez externích zásilek.
muluna-hardcore-remove-starting-cargo-pods=Odstraňuje na Muluně počáteční nákladní kapsle. To znemožňuje založení základny Muluna bez externích zásilek.

[nav-beacon]
single-per-platform=Na jedné vesmírné platformě může existovat pouze jeden globální navigační maják.

[tips-and-tricks-item-name]
muluna-briefing=Muluna instrukce
space-science=Vesmírná věda na vesmírných základnách

[tips-and-tricks-item-description]
muluna-briefing=[planet=muluna] je nekonečná rozloha šedé skály. Na povrchu se hojně vyskytují meteority a jsou bohaté na kovy, palivo a vodu. K dosažení těchto zdrojů je nutné meteority nejprve rozdrtit v [entity=crusher].\n[entity=metallic-asteroid-chunk]: Primární zdroj [item=iron-ore]. [entity=carbonic-asteroid-chunk]: Primární zdroj chemického paliva ve formě [item=carbon].\n[entity=oxide-asteroid-chunk]: Primární zdroj [fluid=water]. [entity=anorthite-chunk]: Alternativní zdroj [item=copper-cable] a [item=rocket-fuel].\nPalivo nelze spalovat bez umělého zdroje [fluid=oxygen]. Ropné produkty zde nelze vyrábět bez technologií, které jsou mimo naše současné chápání.
space-science=Po vyzkoumání [item=interstellar-science-pack] bude možné vyrábět [item=space-science-pack] na vesmírných základnách s využitím zpracovaných kusů asteroidů.

[console]
muluna-satellite-radar-invalid-storage=[Muluna] CHYBA: Úložiště dat satelitního radaru je neplatné, úložiště se maže, aby se zabránilo selhání. Možná budete muset radary znovu umístit.
muluna-incompatible-aps-setting=Nastavení „Spuštění Muluny“ a „(Těžké) Odstranění počátečních nákladních kapslí“ nejsou kompatibilní. Toto uložení je zablokováno. Spusťte nové uložení s jednou z těchto možností vypnutou.
