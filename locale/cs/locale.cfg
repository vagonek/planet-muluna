[mod-description]
planet-muluna=○🌐Prozkoumejte Nauvisův měsíc Muluna a udělejte svůj první krok do vesmíru. Vylepšuje vesmírný vědecký balíček, který bude vytvořen na Muluně. Povrch je bez života, ale kdo ví, co se skrývá v mnoha měsíčních kráterech?

